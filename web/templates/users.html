{% extends "base.html" %}
{% block title %}Пользователи{% endblock %}
{% block page_title %}Пользователи{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <span class="card-title">Все пользователи бота</span>
    <input type="text" placeholder="Поиск..." style="width:200px;margin:0;" oninput="filterUsers(this.value)">
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Telegram ID</th>
          <th>Имя</th>
          <th>Username</th>
          <th>Сообщений</th>
          <th>Первый раз</th>
          <th>Последний раз</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="7"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allUsers = [];

async function loadUsers() {
  allUsers = await api('/api/users');
  renderUsers(allUsers);
}

function renderUsers(users) {
  const tbody = document.getElementById('users-body');
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">◇</div><p>Нет пользователей</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><code>${u.id}</code></td>
      <td><b>${u.full_name || '—'}</b></td>
      <td style="color:var(--accent)">${u.username ? '@' + u.username : '—'}</td>
      <td><span class="badge badge-cyan">${u.messages_count || 0}</span></td>
      <td style="color:var(--text3);font-size:11px;">${u.first_seen || '—'}</td>
      <td style="color:var(--text3);font-size:11px;">${u.last_seen || '—'}</td>
      <td>
        <a href="/messages" onclick="sessionStorage.setItem('openUser', '${u.id}')" class="btn btn-sm">Переписка</a>
      </td>
    </tr>
  `).join('');
}

function filterUsers(q) {
  q = q.toLowerCase();
  renderUsers(allUsers.filter(u =>
    (u.full_name || '').toLowerCase().includes(q) ||
    (u.username || '').toLowerCase().includes(q) ||
    String(u.id).includes(q)
  ));
}

loadUsers();
</script>
{% endblock %}
